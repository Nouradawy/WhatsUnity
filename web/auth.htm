<!DOCTYPE html>
<html>
<head>
    <title>Authentication Callback</title>
    <script>
        // This script takes the success URL from Appwrite, securely sends it
        // to your main Flutter window, and then automatically closes the pop-up!
        if (window.opener) {
          window.opener.postMessage(window.location.href, window.location.origin);
          window.close();
        }
    </script>
</head>
<body>
<p>Authenticating... Please wait.</p>
</body>
</html>
