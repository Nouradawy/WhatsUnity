<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/WhatsUnity/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1976D2">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-title" content="WhatsUnity">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>WhatsUnity</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // Explicitly register the Firebase Messaging Service Worker for GitHub Pages support.
    // GitHub Pages serves apps from a subpath (e.g. /YourRepoName/), so we must
    // ensure the browser looks for the SW relative to the current base path.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        // Find the base path from the <base> tag or use current directory
        var base = document.querySelector('base') ? document.querySelector('base').getAttribute('href') : '/';
        var swPath = base + 'firebase-messaging-sw.js';

        navigator.serviceWorker.register(swPath).then(function(registration) {
          console.log('Firebase Service Worker registered with scope:', registration.scope);
        }).catch(function(err) {
          console.error('Firebase Service Worker registration failed:', err);
        });
      });
    }
  </script>
</head>
<body>
<script src="https://accounts.google.com/gsi/client" async defer></script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
